<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgot Password — Rinmora</title>
<meta name="description" content="Reset your Rinmora account password.">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: { primary: '#CFBAA5', 'primary-dark': '#b89e84', ink: '#000000' },
        fontFamily: { sans: ['Poppins', 'sans-serif'], body: ['Manrope', 'sans-serif'] },
        borderRadius: { '4xl': '2rem', '5xl': '2.5rem' },
        boxShadow: { soft: '0 20px 60px -15px rgba(0,0,0,0.15)', card: '0 10px 40px -12px rgba(0,0,0,0.12)' },
      },
    },
  };
</script>

<style>
  html { -webkit-tap-highlight-color: transparent; }
  body { font-family: 'Manrope', sans-serif; }
  .font-display { font-family: 'Poppins', sans-serif; }
  ::-webkit-scrollbar { display: none; }
  * { scrollbar-width: none; -ms-overflow-style: none; }
  .fade-up { animation: fadeUp .6s cubic-bezier(.16,1,.3,1) both; }
  @keyframes fadeUp { from { opacity:0; transform: translateY(16px);} to {opacity:1; transform:translateY(0);} }
  .btn-ripple { position: relative; overflow: hidden; }
  .btn-ripple span.ripple { position: absolute; border-radius: 9999px; transform: scale(0); animation: ripple .6s linear; background: rgba(0,0,0,0.15); pointer-events: none; }
  @keyframes ripple { to { transform: scale(3); opacity: 0; } }
</style>
</head>

<body class="bg-white text-ink antialiased min-h-screen">

<!-- =========================================================
     MINIMAL HEADER
========================================================== -->
<header class="sticky top-0 z-50 bg-white/95 backdrop-blur-md border-b border-black/5">
  <div class="max-w-7xl mx-auto px-5 md:px-8 lg:px-10">
    <div class="flex items-center justify-between h-16 md:h-20">
      <a href="rinmora-home-preview.html" class="select-none">
        <img src="../logo-01.png" alt="Rinmora" class="h-10 md:h-12 w-auto">
      </a>
      <a href="rinmora-login-preview.html" class="font-display text-xs font-semibold uppercase tracking-wide text-black/50 hover:text-ink transition">
        <i class="fa-solid fa-arrow-left mr-2 text-[10px]"></i> Back to Sign In
      </a>
    </div>
  </div>
</header>

<!-- =========================================================
     FORGOT PASSWORD
========================================================== -->
<main class="min-h-[calc(100vh-64px)] md:min-h-[calc(100vh-80px)] flex items-center justify-center px-5 py-16">
  <div class="w-full max-w-md fade-up">

    <!-- Request Form State -->
    <div id="requestState" class="bg-white rounded-3xl shadow-card p-7 md:p-10 text-center">
      <div class="w-16 h-16 mx-auto mb-6 rounded-full bg-primary/20 grid place-items-center">
        <i class="fa-solid fa-key text-xl text-primary-dark"></i>
      </div>
      <h1 class="font-display text-2xl font-semibold mb-2">Forgot Your Password?</h1>
      <p class="text-black/50 text-sm mb-8">Enter your email address and we'll send you a link to reset your password.</p>

      <form class="space-y-5 text-left" onsubmit="return false;">
        <div>
          <label for="resetEmail" class="block text-xs font-display font-medium text-black/50 mb-2">Email Address</label>
          <input id="resetEmail" type="email" placeholder="you@example.com" class="w-full px-5 py-3.5 rounded-xl border border-black/10 text-sm focus:outline-none focus:ring-2 focus:ring-primary transition">
        </div>

        <button id="sendResetBtn" class="btn-ripple w-full bg-primary text-ink font-display font-semibold text-sm uppercase tracking-wide py-4 rounded-full hover:bg-primary-dark transition">
          Send Reset Link
        </button>
      </form>

      <a href="rinmora-login-preview.html" class="inline-flex items-center gap-2 mt-7 font-display text-xs font-semibold uppercase tracking-wide text-black/55 hover:text-ink transition">
        <i class="fa-solid fa-arrow-left text-[10px]"></i> Back to Login
      </a>
    </div>

    <!-- Success State -->
    <div id="successState" class="hidden bg-white rounded-3xl shadow-card p-7 md:p-10 text-center">
      <div class="w-16 h-16 mx-auto mb-6 rounded-full bg-primary/20 grid place-items-center">
        <i class="fa-solid fa-envelope-circle-check text-xl text-primary-dark"></i>
      </div>
      <h1 class="font-display text-2xl font-semibold mb-2">Check Your Email</h1>
      <p class="text-black/50 text-sm mb-1">We've sent a password reset link to</p>
      <p class="font-display font-semibold text-sm mb-8" id="sentEmailDisplay">you@example.com</p>

      <p class="text-black/45 text-xs mb-7">Didn't receive the email? Check your spam folder, or</p>

      <button id="resendBtn" class="font-display text-xs font-semibold uppercase tracking-wide text-ink underline underline-offset-4 hover:text-primary-dark transition">
        Resend Link
      </button>

      <a href="rinmora-login-preview.html" class="flex items-center justify-center gap-2 mt-8 font-display text-xs font-semibold uppercase tracking-wide text-black/55 hover:text-ink transition">
        <i class="fa-solid fa-arrow-left text-[10px]"></i> Back to Login
      </a>
    </div>

  </div>
</main>

<script>
  const requestState = document.getElementById('requestState');
  const successState = document.getElementById('successState');
  const sendResetBtn = document.getElementById('sendResetBtn');
  const resetEmail = document.getElementById('resetEmail');
  const sentEmailDisplay = document.getElementById('sentEmailDisplay');

  sendResetBtn.addEventListener('click', () => {
    sentEmailDisplay.textContent = resetEmail.value || 'you@example.com';
    requestState.classList.add('hidden');
    successState.classList.remove('hidden');
  });

  document.getElementById('resendBtn').addEventListener('click', function () {
    this.textContent = 'Link Resent ✓';
    setTimeout(() => { this.textContent = 'Resend Link'; }, 2500);
  });

  document.querySelectorAll('.btn-ripple').forEach(btn => {
    btn.addEventListener('click', function (e) {
      const rect = this.getBoundingClientRect();
      const ripple = document.createElement('span');
      ripple.className = 'ripple';
      const size = Math.max(rect.width, rect.height);
      ripple.style.width = ripple.style.height = size + 'px';
      ripple.style.left = (e.clientX - rect.left - size / 2) + 'px';
      ripple.style.top = (e.clientY - rect.top - size / 2) + 'px';
      this.appendChild(ripple);
      setTimeout(() => ripple.remove(), 650);
    });
  });
</script>

</body>
</html>
